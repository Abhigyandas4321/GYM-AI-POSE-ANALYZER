<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign Up - Gym AI Pose Analyzer</title>
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "Segoe UI", Arial, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(255,140,0,0.08), transparent 22%),
                radial-gradient(circle at top right, rgba(0,170,255,0.05), transparent 18%),
                linear-gradient(180deg, #07111d 0%, #0a1321 100%);
            color: #f5f7fb;
        }

        .auth-card {
            width: min(92vw, 440px);
            padding: 28px;
            border-radius: 22px;
            background: rgba(10, 18, 30, 0.92);
            border: 1px solid rgba(255,255,255,0.10);
            box-shadow: 0 20px 50px rgba(0,0,0,0.35);
        }

        .brand {
            margin-bottom: 22px;
        }

        .brand h1 {
            margin: 0;
            color: #ff8c00;
            font-size: 2.2rem;
            line-height: 1;
        }

        .brand p {
            margin: 8px 0 0 0;
            color: #a6b4c8;
        }

        .title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #cbd5e1;
            font-size: 0.95rem;
        }

        input {
            width: 100%;
            padding: 13px 14px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.04);
            color: white;
            outline: none;
            margin-bottom: 16px;
            font-size: 0.98rem;
        }

        input:focus {
            border-color: #ff8c00;
        }

        .btn {
            width: 100%;
            padding: 13px 14px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #ff8c00, #ff6a00);
            color: white;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
        }

        .btn:hover {
            opacity: 0.96;
        }

        .error {
            margin-bottom: 14px;
            padding: 12px 14px;
            border-radius: 12px;
            background: rgba(255, 82, 82, 0.12);
            border: 1px solid rgba(255, 82, 82, 0.25);
            color: #ffb3b3;
        }

        .footer {
            margin-top: 18px;
            text-align: center;
            color: #a6b4c8;
        }

        .footer a {
            color: #ff8c00;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="brand">
            <h1>GYM AI</h1>
            <p>Pose Analyzer</p>
        </div>

        <div class="title">Create Account</div>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="post">
            <label>Username</label>
            <input type="text" name="username" placeholder="Enter username" required>

            <label>Email</label>
            <input type="email" name="email" placeholder="Enter your email" required>

            <label>Password</label>
            <input type="password" name="password" placeholder="Minimum 6 characters" required>

            <label>Confirm Password</label>
            <input type="password" name="confirm_password" placeholder="Re-enter password" required>

            <button class="btn" type="submit">Sign Up</button>
        </form>

        <div class="footer">
            Already have an account?
            <a href="{{ url_for('login') }}">Login</a>
        </div>
    </div>
</body>
</html>
